name: Publish

on:
  push:
    tags:
      - "**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish new version to TER
        uses: tomasnorre/typo3-upload-ter@7982891f20d0b224f67e250e8ea8814d9e5f9671
        with:
          api-token: ${{ secrets.TYPO3_API_TOKEN }}
